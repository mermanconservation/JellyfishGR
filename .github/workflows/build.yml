name: Build APK + AAB

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  build:
    name: Build Release APK and AAB
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 (required for AGP 8.x) ─────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Cache Gradle dependencies ───────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 4. Make gradlew executable ─────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ── 5. Build debug APK (no signing required) ───────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 6. Build release AAB (unsigned — sign before Play Store) ───
      - name: Build Release AAB
        run: ./gradlew bundleRelease --no-daemon --stacktrace

      # ── 7. Build release APK (unsigned) ────────────────────────────
      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      # ── 8. Upload APK (debug) ──────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: JellyfishGR-debug.apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 9. Upload APK (release, unsigned) ─────────────────────────
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: JellyfishGR-release-unsigned.apk
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

      # ── 10. Upload AAB (release) ───────────────────────────────────
      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: JellyfishGR-release.aab
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      # ── 11. Print artifact sizes ───────────────────────────────────
      - name: Show build sizes
        run: |
          echo "=== Build Outputs ==="
          find app/build/outputs -name "*.apk" -o -name "*.aab" | while read f; do
            echo "$(du -sh "$f" | cut -f1)  $f"
          done
